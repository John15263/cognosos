services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cognosos-postgres
    # Local development only. Do not expose this password on a networked deployment.
    environment:
      POSTGRES_DB: cognosos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001_extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cognosos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
